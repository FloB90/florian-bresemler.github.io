<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Florian Bresemler – Virtueller Assistent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;
      --accent: #c8a96e; --text: #e8e4de; --muted: #666;
      --mono: 'DM Mono', monospace; --serif: 'Playfair Display', serif;
    }
    html, body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: var(--mono); display: flex; align-items: center;
      justify-content: center; overflow-x: hidden;
    }
    .card {
      position: relative; z-index: 1; width: min(420px, 96vw);
      padding: 48px 40px; background: var(--surface); border: 1px solid var(--border);
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .card::before, .card::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 32px; opacity: 0; animation: rise 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .name { font-family: var(--serif); font-size: clamp(28px, 8vw, 38px); font-weight: 700; line-height: 1.1; margin-bottom: 6px; opacity: 0; animation: rise 0.6s 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .role { font-size: 12px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 40px; opacity: 0; animation: rise 0.6s 0.32s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .divider { height: 1px; background: linear-gradient(90deg, var(--accent) 0%, transparent 100%); margin-bottom: 36px; opacity: 0; animation: rise 0.6s 0.38s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .contacts { display: flex; flex-direction: column; gap: 18px; margin-bottom: 36px; opacity: 0; animation: rise 0.6s 0.44s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .contact-row { display: flex; align-items: center; gap: 16px; text-decoration: none; color: var(--text); transition: color 0.2s; }
    .contact-row:hover { color: var(--accent); }
    .contact-icon { width: 32px; height: 32px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.2s; }
    .contact-row:hover .contact-icon { border-color: var(--accent); }
    .contact-icon svg { width: 14px; height: 14px; fill: currentColor; }
    .contact-info { display: flex; flex-direction: column; gap: 2px; }
    .contact-key { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .contact-val { font-size: 13px; }
    .services { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; opacity: 0; animation: rise 0.6s 0.50s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .tag { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--border); padding: 5px 10px; color: var(--muted); }
    .save-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, color 0.2s; opacity: 0; animation: rise 0.6s 0.56s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .save-btn:hover { background: var(--accent); color: var(--bg); }
    .footer { margin-top: 28px; font-size: 9px; letter-spacing: 0.12em; color: var(--muted); text-align: center; opacity: 0; animation: rise 0.6s 0.62s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD','VERSION:3.0','FN:Florian Bresemler',
        'N:Bresemler;Florian;;;',
        'TITLE:Virtueller Assistent & Social Media Manager',
        'ORG:Fryan Virtual Assistant',
        'TEL;TYPE=CELL:+4915678679002',
        'EMAIL:info@fryan.de',
        'URL:https://instagram.com/fryanvirtualassistent',
        'ADR;TYPE=WORK:;;Hamburg;;;Germany',
        'END:VCARD'
      ].join('\r\n');
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'florian-bresemler.vcf'; a.click();
      URL.revokeObjectURL(url);
    }
  </script>
